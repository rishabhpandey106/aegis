name: Aegis CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -----------------------------------------------------
  # 1. Go Microservices Pipeline (Proxy, API, Analytics)
  # -----------------------------------------------------
  go-ci:
    name: Build & Test Go Services
    runs-on: ubuntu-latest

    # Setup temporary services for Integration Testing
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aegis_user
          POSTGRES_PASSWORD: aegis_password
          POSTGRES_DB: aegis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      
      - name: Wait for Postgres
        run: sleep 10

      - name: Verify Go Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted properly. Run 'gofmt -w .'"
            exit 1
          fi

      - name: Install Dependencies
        run: go mod download

      - name: Build Proxy
        run: make build-proxy

      - name: Build Control Plane
        run: make build-control-plane

      - name: Build Analytics Worker
        run: make build-analytics-worker

      - name: Run Unit & Integration Tests (With Race Detector)
        env:
          DATABASE_URL: postgres://aegis_user:aegis_password@localhost:5432/aegis?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: make test

  # -----------------------------------------------------
  # 2. Python AI Engine Pipeline
  # -----------------------------------------------------
  python-ci:
    name: Lint AI Engine
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./ai-engine

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
